name: Build modules.js from library metadata

on:
  push:
    branches: [main]
    paths:
      - 'library/**'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan library and rebuild modules.js
        run: node .github/scripts/build-modules.js

      - name: Commit updated modules.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules.js
          git diff --cached --quiet && echo "modules.js unchanged — nothing to commit." && exit 0
          git commit -m "auto: rebuild modules.js from library metadata"
          git push
